[tools]
dotnet = "10.0"

[tasks.restore]
description = "Restore dependencies"
run = "dotnet restore"

[tasks.tool-restore]
description = "Restore local dotnet tools"
run = "dotnet tool restore"

[tasks.build]
description = "Build the solution"
run = "dotnet build"
depends = ["restore"]

[tasks.test]
description = "Run tests with coverage"
run = """
dotnet test \
  --coverage \
  --coverage-output-format cobertura \
  --coverage-output "$PWD/coverage/coverage.cobertura.xml"
"""
depends = ["build"]

[tasks.example]
description = "Run test-prune against the example solution"
run = "dotnet run --project src/TestPrune -- --repo examples/SampleSolution index"
depends = ["build"]

[tasks.example-build]
description = "Build the example solution (for CI)"
run = "dotnet build examples/SampleSolution --warnaserror"
depends = ["build"]

[tasks.format]
description = "Format code with Fantomas"
run = "dotnet fantomas src/ tests/ examples/"
depends = ["tool-restore"]

[tasks.format-check]
description = "Check formatting without making changes"
run = "dotnet fantomas src/ tests/ examples/ --check"
depends = ["tool-restore"]

[tasks.lint]
description = "Run FSharpLint"
run = "dotnet fsharplint lint TestPrune.slnx"
depends = ["build", "tool-restore"]

[tasks.coverage-check]
description = "Check per-file coverage meets minimum threshold (50%)"
run = "dotnet fsi scripts/check-coverage.fsx"
depends = ["test"]

[tasks.dead-code]
description = "Find unreachable production code"
run = "dotnet run --project src/TestPrune -- dead-code"
depends = ["build"]

[tasks.dead-code-tests]
description = "Find unreachable test code (dead test helpers)"
run = "dotnet run --project src/TestPrune -- dead-code --include-tests"
depends = ["build"]

[tasks.dead-code-example]
description = "Find dead code in example solution (library + consumer)"
run = """
dotnet run --project src/TestPrune -- --repo examples/SampleSolution index
dotnet run --project src/TestPrune -- --repo examples/SampleSolution dead-code --entry "SampleWeb.Handlers.*"
"""
depends = ["build", "example-build"]

[tasks.check-api]
description = "Check API changes since last release"
run = "dotnet fsi scripts/check-api.fsx"
depends = ["build"]

[tasks.sync-docs]
description = "Sync README.md content to docs/index.md"
run = "dotnet fsi scripts/sync-docs.fsx"

[tasks.sync-docs-check]
description = "Check if docs/index.md is in sync with README.md"
run = "dotnet fsi scripts/sync-docs.fsx --check"

[tasks.docs]
description = "Generate API documentation"
run = "dotnet fsdocs build --output output/docs --clean --parameters root /TestPrune/"
depends = ["build", "tool-restore"]

[tasks.docs-watch]
description = "Watch and serve documentation locally"
run = "dotnet fsdocs watch"
depends = ["build", "tool-restore"]

[tasks.check]
description = "Run all checks with auto-fix (format, sync-docs, then verify)"
depends = ["format", "sync-docs", "lint", "coverage-check", "docs", "example-build"]

[tasks.ci]
description = "Run all CI checks (no auto-fix)"
depends = ["format-check", "lint", "coverage-check", "sync-docs-check", "docs", "example-build"]

[tasks.pack]
description = "Create NuGet packages"
run = """
dotnet pack src/TestPrune.Core/TestPrune.Core.fsproj -c Release -o artifacts
dotnet pack src/TestPrune.Falco/TestPrune.Falco.fsproj -c Release -o artifacts
dotnet pack src/TestPrune/TestPrune.fsproj -c Release -o artifacts
"""
depends = ["build"]
