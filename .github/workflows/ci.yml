name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'core-v*'
      - 'falco-v*'
  pull_request:
    branches: [main, master]

permissions:
  contents: write  # For creating releases
  checks: write
  pull-requests: write
  id-token: write  # For NuGet trusted publishing (OIDC)
  pages: write     # For GitHub Pages deployment

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet fantomas src/ tests/ examples/ --check

      - name: Check docs sync
        run: dotnet fsi scripts/sync-docs.fsx --check

      - name: Build
        run: dotnet build --no-restore

      - name: Lint
        run: dotnet fsharplint lint TestPrune.slnx

      - name: Generate docs
        run: dotnet fsdocs build --output output/docs --clean --parameters root /TestPrune/

      - name: Upload docs artifact
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/core-v') || startsWith(github.ref, 'refs/tags/falco-v'))
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: output/docs

      - name: Build example
        run: dotnet build examples/SampleSolution --warnaserror

      - name: Test with coverage
        run: |
          dotnet test --no-build --verbosity normal \
            --coverage \
            --coverage-output-format cobertura \
            --coverage-output "$PWD/coverage/coverage.cobertura.xml"

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: ./coverage/coverage.cobertura.xml
          targetdir: ./coverage/report
          reporttypes: Cobertura;MarkdownSummaryGithub;Html

      - name: Check coverage threshold
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: ./coverage/report/Cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: false
          indicators: true
          output: both
          thresholds: '50 70'

      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage/report

  deploy-docs:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/core-v') || startsWith(github.ref, 'refs/tags/falco-v'))
    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Check for stable version tags
        id: check
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" =~ (alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          STABLE=$(git tag -l 'core-v*' 'falco-v*' | grep -cvE '(alpha|beta|rc)' || true)
          echo "has_stable=$([[ "$STABLE" -gt 0 ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          if [[ "$TAG" == core-v* ]]; then
            echo "package=core" >> $GITHUB_OUTPUT
          else
            echo "package=falco" >> $GITHUB_OUTPUT
          fi

      - name: Download docs artifact
        if: steps.check.outputs.is_prerelease == 'false' || steps.check.outputs.has_stable == 'false'
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: /tmp/docs-output

      - name: Deploy to gh-pages branch
        if: steps.check.outputs.is_prerelease == 'false' || steps.check.outputs.has_stable == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clean working tree so we can switch branches
          git clean -fd
          git checkout -- .

          # Create gh-pages branch if it doesn't exist
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi

          PACKAGE="${{ steps.check.outputs.package }}"
          if [[ "$PACKAGE" == "core" ]]; then
            # Core owns everything except Falco/ and reference/testprune-falco-*
            rsync -a --delete \
              --exclude='.git' \
              --exclude='Falco/' \
              --exclude='reference/testprune-falco-*' \
              --filter='protect .git' \
              --filter='protect Falco/' \
              --filter='protect reference/testprune-falco-*' \
              /tmp/docs-output/ ./
          else
            # Falco owns Falco/ and reference/testprune-falco-*
            mkdir -p Falco reference
            rsync -a --delete /tmp/docs-output/Falco/ ./Falco/
            rsync -a /tmp/docs-output/reference/testprune-falco-* ./reference/
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No docs changes to deploy"
          else
            git commit -m "Deploy $PACKAGE docs from ${GITHUB_REF#refs/tags/}"
            git push origin gh-pages
          fi

  pack:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Pack Core
        run: dotnet pack src/TestPrune.Core/TestPrune.Core.fsproj -c Release -o ./artifacts

      - name: Pack Falco
        run: dotnet pack src/TestPrune.Falco/TestPrune.Falco.fsproj -c Release -o ./artifacts

      - name: Pack CLI
        run: dotnet pack src/TestPrune/TestPrune.fsproj -c Release -o ./artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

  release-core:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/core-v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Pack Core
        run: dotnet pack src/TestPrune.Core/TestPrune.Core.fsproj -c Release --no-build -o ./artifacts

      - name: Pack CLI
        run: dotnet pack src/TestPrune/TestPrune.fsproj -c Release --no-build -o ./artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/core-v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TestPrune v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      - name: Login to NuGet (Trusted Publishing)
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  release-falco:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/falco-v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Pack
        run: dotnet pack src/TestPrune.Falco/TestPrune.Falco.fsproj -c Release --no-build -o ./artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/falco-v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TestPrune.Falco v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      - name: Login to NuGet (Trusted Publishing)
        id: nuget-login
        uses: nuget/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
