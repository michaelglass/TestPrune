name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    uses: michaelglass/MichaelsWackyFsPackageTools/.github/workflows/michaels-wacky-build.yml@main
    with:
      solution: TestPrune.slnx
      fantomas-paths: 'src/ tests/ examples/'
      has-examples: true
      example-path: 'examples/SampleSolution'
    permissions:
      contents: read
      checks: write
      pull-requests: write
