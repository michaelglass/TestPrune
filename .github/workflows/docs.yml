name: Deploy Docs

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy-docs:
    uses: michaelglass/MichaelsWackyFsPackageTools/.github/workflows/michaels-wacky-docs.yml@main
    with:
      fsdocs-parameters: '--parameters root /TestPrune/'
    permissions:
      contents: read
      pages: write
      id-token: write
